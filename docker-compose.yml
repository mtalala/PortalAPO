services:
  postgres:
    image: postgres:15
    container_name: apo-postgres
    environment:
      POSTGRES_DB: apo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    image: apo-backend
    container_name: apo-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/apo
      DB_USER: postgres
      DB_PASS: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: